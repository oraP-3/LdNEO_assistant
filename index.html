<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ドンジャラNEO ラブライブ！ 待ち牌・点数チェッカー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .playable { transition: transform 0.1s, box-shadow 0.1s; cursor: pointer; }
        .playable:active { transform: scale(0.95); }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .rainbow-bg {
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 200% 200%;
            animation: rainbow 2s linear infinite;
        }
        @keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        .text-shadow-sm { text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        
        /* 選択時のアニメーション */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-in { animation: popIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-gray-800 flex flex-col h-screen overflow-hidden">

<div id="app" class="max-w-3xl mx-auto w-full flex-grow flex flex-col h-full relative p-2 gap-1.5 md:gap-2">
    
    <!-- ヘッダー -->
    <div class="bg-white p-2 md:p-3 rounded-lg shadow-sm flex justify-between items-center shrink-0 border-b-4 border-blue-500">
        <div>
            <h1 class="text-sm md:text-xl font-black text-blue-700 leading-tight">ドンジャラNEO ラブライブ！<br><span class="text-xs md:text-base text-gray-600">待ち牌・点数チェッカー</span></h1>
        </div>
        <button onclick="clearHand()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1.5 md:py-2 px-3 md:px-4 rounded-full text-xs md:text-sm shadow transition flex items-center gap-1 shrink-0 ml-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
            全クリア
        </button>
    </div>

    <!-- モード切替とコントロールパネル -->
    <div class="flex flex-col gap-1 shrink-0">
        <!-- 親子・思想セット コントロールパネル -->
        <div class="flex justify-between items-center bg-white p-1.5 md:p-2 rounded-lg shadow-sm border border-gray-200">
            <div class="flex items-center gap-1.5">
                <span class="text-[10px] md:text-xs font-bold text-gray-600">自風</span>
                <div class="flex bg-gray-200 rounded p-0.5">
                    <button id="btn-oya" onclick="setOya(true)" class="px-2 md:px-3 py-1 text-[10px] md:text-xs font-bold rounded bg-white text-red-600 shadow-sm">親</button>
                    <button id="btn-ko" onclick="setOya(false)" class="px-2 md:px-3 py-1 text-[10px] md:text-xs font-bold rounded text-gray-500 hover:text-gray-700">子</button>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <span class="text-[10px] md:text-xs font-bold text-gray-600">親の思想:</span>
                <div id="thought-area" class="flex gap-1 items-center min-w-[60px] justify-end">
                    <span class="text-[9px] text-gray-400">未設定</span>
                </div>
            </div>
        </div>

        <!-- 入力モード切替 -->
        <div class="flex bg-gray-200 rounded-lg p-1">
            <button id="btn-mode-hand" onclick="setInputMode('hand')" class="flex-1 py-1.5 md:py-2 text-[10px] md:text-sm font-bold rounded-md bg-white text-blue-600 shadow-sm transition border-2 border-blue-400">手牌に入力</button>
            <button id="btn-mode-visible" onclick="setInputMode('visible')" class="flex-1 py-1.5 md:py-2 text-[10px] md:text-sm font-bold rounded-md text-gray-500 hover:text-gray-700 transition border-2 border-transparent">場見え牌(純カラ)</button>
            <button id="btn-mode-thought" onclick="setInputMode('thought')" class="flex-1 py-1.5 md:py-2 text-[10px] md:text-sm font-bold rounded-md text-gray-500 hover:text-gray-700 transition border-2 border-transparent">思想設定(2枚)</button>
        </div>
    </div>

    <!-- 選択中の手牌エリア -->
    <div id="area-hand" class="bg-white p-2 rounded-lg shadow-sm flex flex-col ring-2 ring-blue-400 transition-all shrink-0 relative overflow-hidden">
        <!-- 誤操作防止用オーバーレイ（非表示） -->
        <div id="hand-overlay" class="hidden absolute inset-0 bg-slate-200/50 z-30 backdrop-blur-[1px]"></div>
        
        <div class="flex justify-between items-end mb-1 relative z-40">
            <h2 class="font-bold text-gray-700 text-xs md:text-sm flex items-center gap-2">
                現在の手牌・鳴き牌 <span id="hand-count-badge" class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-[10px] md:text-xs shadow-sm">0 / 9 枚</span>
            </h2>
            <span id="hand-remove-text" class="text-[9px] md:text-[10px] text-gray-500 font-bold bg-gray-200 px-1.5 py-0.5 rounded shadow-sm">タップで外す</span>
        </div>
        <div class="bg-slate-50 p-1 md:p-1.5 rounded border border-slate-200 flex justify-center w-full relative z-20">
            <div id="selected-hand" class="grid grid-cols-9 gap-0.5 sm:gap-1 md:gap-2 w-full">
                <!-- JSで生成 -->
            </div>
        </div>
    </div>

    <!-- 判定結果エリア -->
    <div class="bg-white rounded-lg shadow-sm flex-grow flex flex-col min-h-0 overflow-hidden border-2 border-transparent" id="result-container">
        <div class="bg-slate-800 text-white font-bold p-1.5 md:p-2 text-center text-xs md:text-sm shrink-0" id="result-header">
            判定結果
        </div>
        <div id="result-body" class="flex-grow overflow-y-auto custom-scroll p-2 bg-slate-50 flex flex-col gap-2">
            <!-- JSで生成 -->
        </div>
    </div>

    <!-- 牌パレット（入力用） ★高さを確保し、横長・文字大サイズ -->
    <div id="palette-container" class="bg-white rounded-lg shadow-sm shrink-0 flex flex-col h-[200px] sm:h-[220px] md:h-64 border-t-4 border-gray-300 transition-colors duration-300">
        <div id="series-tabs" class="flex overflow-x-auto custom-scroll bg-gray-100 shrink-0 border-b border-gray-200">
            <!-- JSで生成 -->
        </div>
        <!-- 横幅を広く取り、5列で配置 -->
        <div id="tile-palette" class="flex-grow overflow-y-auto custom-scroll p-1.5 md:p-2 grid grid-cols-5 sm:grid-cols-7 md:grid-cols-9 gap-1.5 md:gap-2 content-start bg-slate-100">
            <!-- JSで生成 -->
        </div>
    </div>

    <!-- 全クリア確認用カスタムモーダル -->
    <div id="clear-confirm-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm text-center transform scale-95 md:scale-100">
            <div class="text-red-500 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
            </div>
            <h2 class="text-lg md:text-xl font-black text-gray-800 mb-2">全クリアの確認</h2>
            <p class="text-sm md:text-base text-gray-600 mb-6">手牌、場見え牌、思想セットなど<br>すべてリセットしますか？</p>
            <div class="flex justify-center gap-3">
                <button onclick="executeClearHand()" class="bg-red-500 text-white font-bold py-2 px-6 rounded-full hover:bg-red-600 shadow-md transition">はい</button>
                <button onclick="closeClearConfirm()" class="bg-gray-300 text-gray-700 font-bold py-2 px-6 rounded-full hover:bg-gray-400 shadow-md transition">いいえ</button>
            </div>
        </div>
    </div>

    <!-- 上部トースト通知 -->
    <div id="toast-message" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-600 text-white font-bold px-4 py-2 rounded-full shadow-lg z-[100] transition-all duration-300 -translate-y-20 opacity-0 pointer-events-none whitespace-nowrap">
        メッセージ
    </div>

</div>

    function evaluateHand(handArray) {
        let allTiles = [...handArray];
        if (allTiles.length !== 9) return { canAgari: false, reason: "length" };

        let totalScore = 0;
        let hasBasicYaku = false;
        let bonusYakuCount = 0;
        let satisfiedYaku = [];

        let seriesInfo = {};
        let logoSchoolCount = 0;
        const greenCharIds = ["muse_hanayo", "aqours_kanan", "niji_emma", "niji_shioriko", "liella_sumire", "hasu_izumi", "musical_hikaru", "musical_rena", "ikizu_akira", "ikizu_midori"];
        let greenMatchCount = 0;

        allTiles.forEach(t => {
            if (!seriesInfo[t.series]) seriesInfo[t.series] = { chars: 0, almighties: 0 };
            if (t.type === 'character') seriesInfo[t.series].chars++;
            else seriesInfo[t.series].almighties++;

            if (t.type === 'logo' || t.type === 'school') logoSchoolCount++;
            if (t.characterId && greenCharIds.includes(t.characterId)) greenMatchCount++;
        });

        let setsOfThree = 0;
        let isOneSeries = false;
        let isSpecialYaku = false;

        Object.values(seriesInfo).forEach(info => {
            const total = info.chars + info.almighties;
            if (total === 9) isOneSeries = true;

            const maxSetsByTotal = Math.floor(total / 3);
            const maxSetsByChars = info.chars; 
            setsOfThree += Math.min(maxSetsByTotal, maxSetsByChars);
        });

        // 特殊役判定
        if (logoSchoolCount === 9) {
            hasBasicYaku = true;
            isSpecialYaku = true;
            satisfiedYaku.push({ name: "ALL STARS", score: 780000 });
            totalScore += 780000;
        } else if (greenMatchCount === 9) {
            hasBasicYaku = true;
            isSpecialYaku = true;
            satisfiedYaku.push({ name: "緑一色", score: 1200000 });
            totalScore += 1200000;
        } else if (isOneSeries) {
            hasBasicYaku = true;
            satisfiedYaku.push({ name: "1シリーズセット", score: 420000 });
            totalScore += 420000;
        } else if (setsOfThree >= 3) {
            hasBasicYaku = true;
            satisfiedYaku.push({ name: "3シリーズセット", score: 60000 });
            totalScore += 60000;
        }

        if (!hasBasicYaku) return { canAgari: false, reason: "basic" };

        const handCharIds = allTiles.map(t => t.characterId).filter(id => id != null);
        const handIds = allTiles.map(t => t.id);

        // ★追加: 親の思想セット判定（ボーナス役として処理）
        if (thoughtTiles.length === 2) {
            const thoughtMatchCount = thoughtTiles.filter(t => handIds.includes(t.id)).length;
            if (thoughtMatchCount === 2) {
                const thoughtScore = isOya ? 120000 : 90000;
                satisfiedYaku.push({ name: "親の思想セット", score: thoughtScore });
                totalScore += thoughtScore;
                bonusYakuCount++;
            }
        }

        masterData.yakuDef.unitSets.forEach(unit => {
            const matchCount = unit.required.filter(reqId => handCharIds.includes(reqId)).length;
            const neededCount = unit.requiredCount || unit.required.length;
            if (matchCount >= neededCount) {
                satisfiedYaku.push({ name: `${unit.name}セット`, score: unit.score });
                totalScore += unit.score;
                bonusYakuCount++;
            }
        });

        let gradeCounts = { 1:0, 2:0, 3:0 };
        allTiles.forEach(t => { if(t.grade) gradeCounts[t.grade]++; });
        [1, 2, 3].forEach(g => {
            if (gradeCounts[g] >= 9) {
                satisfiedYaku.push({ name: `${g}年生コンプ`, score: 360000 });
                totalScore += 360000;
                bonusYakuCount++;
            } else if (gradeCounts[g] >= 5) {
                satisfiedYaku.push({ name: `${g}年生セット`, score: 60000 });
                totalScore += 60000;
                bonusYakuCount++;
            }
        });

        let monthCounts = {};
        allTiles.forEach(t => { if(t.birthMonth) monthCounts[t.birthMonth] = (monthCounts[t.birthMonth] || 0) + 1; });
        Object.keys(monthCounts).forEach(m => {
            if (monthCounts[m] >= 3) {
                const score = ['3','5','7','8','10','11','12'].includes(m) ? 120000 : 60000;
                satisfiedYaku.push({ name: `${m}月生まれセット`, score: score });
                totalScore += score;
                bonusYakuCount++;
            }
        });

        if (bonusYakuCount === 0 && !isSpecialYaku) return { canAgari: false, reason: "bonus" };

        return { canAgari: true, yaku: satisfiedYaku, totalScore: totalScore };
    }

    function checkMachi(base8Tiles, excludeTileIds = []) {
        let machiGroups = {};
        let totalMachiTypes = 0;
        let availableCount = 0;

        for (let j = 0; j < masterData.tiles.length; j++) {
            let candidateTile = masterData.tiles[j];
            
            // 既に手牌にある牌は待ちとしてあり得ないため除外
            if (base8Tiles.some(t => t.id === candidateTile.id)) continue;
            
            // 明示的に除外指定された牌（捨て牌自身）を除外
            if (excludeTileIds.includes(candidateTile.id)) continue;
            
            let testHand = [...base8Tiles, candidateTile];
            let agariRes = evaluateHand(testHand);
            
            if (agariRes.canAgari) {
                totalMachiTypes++;
                const yakuText = agariRes.yaku.map(y=>y.name).join(', ');
                const score = agariRes.totalScore;
                const key = `${score}_${yakuText}`;
                
                // 場見え牌に存在すれば純カラ（出アガリ不可）とする
                const isJunkara = visibleTiles.some(t => t.id === candidateTile.id);
                
                if (!isJunkara) {
                    availableCount++;
                }

                if (!machiGroups[key]) {
                    machiGroups[key] = {
                        score: score,
                        yakuText: yakuText,
                        tiles: []
                    };
                }
                if(!machiGroups[key].tiles.some(t => t.tile.id === candidateTile.id)) {
                    machiGroups[key].tiles.push({ tile: candidateTile, isJunkara: isJunkara });
                }
            }
        }
        
        let resultList = Object.values(machiGroups);
        resultList.sort((a, b) => b.score - a.score);
        return { count: totalMachiTypes, availableCount: availableCount, groups: resultList };
    }

    function createTileHTML(tile, onClickHTML = "", extraClasses = "", overlayHTML = "") {
        const clickableClass = onClickHTML ? "playable" : "";
        const seriesBorder = seriesColors[tile.series].split(' ')[1]; 
        
        let html = `<div class="border sm:border-2 ${seriesBorder} rounded w-full h-[46px] sm:h-[56px] md:h-16 shrink-0 flex flex-col shadow-sm relative bg-white transition-all ${clickableClass} ${extraClasses}" ${onClickHTML}>`;
        html += `<div class="absolute inset-0 opacity-40 ${seriesColors[tile.series].split(' ')[0]} rounded pointer-events-none"></div>`;
        
        if (tile.grade) {
            html += `<span class="absolute top-[1px] left-[2px] font-bold z-10 text-[10px] sm:text-[12px] text-gray-700 leading-none tracking-tighter">${tile.grade}年</span>`;
        }
        
        if (tile.birthMonth || tile.series === 'musical') {
            const topRightText = getMonthOrSchoolText(tile);
            if (topRightText) {
                html += `<span class="absolute top-[1px] right-[2px] z-10 text-[10px] sm:text-[12px] text-gray-700 font-bold leading-none tracking-tighter">${topRightText}</span>`;
            }
        }
        
        let displayName = tile.name;
        if (displayName === "セラス 柳田 リリエンフェルト") displayName = "セラス 柳田<br>ﾘﾘｴﾝﾌｪﾙﾄ";
        else if (displayName.includes(' ')) displayName = displayName.split(' ').join('<br>');
        else if (displayName.includes('・')) displayName = displayName.replace('・', '・<br>');
        
        html += `<div class="flex-grow flex items-center justify-center w-full z-10 mt-3 mb-0.5 px-[2px] overflow-hidden">`;
        html += `<span class="font-bold text-center break-words leading-[1.1] text-[9px] sm:text-[10px] md:text-xs">${displayName}</span>`;
        html += `</div>`;

        html += overlayHTML;
        html += `</div>`;
        return html;
    }

    function createCompactTileHTML(tile, onClickHTML = "", extraClasses = "", monthCount = 0, gradeCount = 0, musicalCount = 0, unitStatus = { complete: [], reach: [] }) {
        const clickableClass = onClickHTML ? "playable" : "";
        const seriesBorder = seriesColors[tile.series].split(' ')[1];
        const seriesBg = seriesColors[tile.series].split(' ')[0];
        
        let html = `<div class="border-2 sm:border ${seriesBorder} rounded w-full aspect-[2/3] shrink-0 flex flex-col shadow-sm relative bg-white transition-all ${clickableClass} ${extraClasses} overflow-hidden" ${onClickHTML}>`;
        html += `<div class="absolute inset-0 opacity-40 ${seriesBg} pointer-events-none"></div>`;
        
        // 学年ハイライト
        let gradeClass = "text-gray-700"; let gradeBg = "";
        if (gradeCount === 4) {
            gradeClass = "text-yellow-900"; gradeBg = "bg-yellow-300 rounded px-1 shadow-[0_0_8px_rgba(250,204,21,1)] z-20 -ml-0.5";
        } else if (gradeCount >= 5 && gradeCount < 9) {
            gradeClass = "text-white"; gradeBg = "bg-red-500 rounded px-1 shadow-[0_0_8px_rgba(239,68,68,1)] z-20 -ml-0.5";
        } else if (gradeCount >= 9) {
            gradeClass = "text-white text-shadow-sm"; gradeBg = "rainbow-bg rounded px-1 shadow-[0_0_12px_rgba(255,255,255,0.8)] z-20 -ml-0.5";
        }

        if (tile.grade) {
            html += `<span class="absolute top-0 left-0 font-bold z-10 text-[7px] sm:text-[9px] whitespace-nowrap scale-90 origin-top-left ${gradeClass} ${gradeBg}">${tile.grade}年</span>`;
        }
        
        // 月/学校ハイライト
        let rightBadgeClass = "text-gray-700"; let rightBadgeBg = "";
        let isRightYellow = false; let isRightRed = false;

        if (tile.birthMonth) {
            if (monthCount === 2) isRightYellow = true;
            else if (monthCount >= 3) isRightRed = true;
        } else if (tile.series === 'musical') {
            if (musicalCount === 4) isRightYellow = true;
            else if (musicalCount >= 5) isRightRed = true;
        }

        if (isRightYellow) {
            rightBadgeClass = "text-yellow-900"; rightBadgeBg = "bg-yellow-300 rounded px-1 shadow-[0_0_8px_rgba(250,204,21,1)] z-20 -mr-0.5";
        } else if (isRightRed) {
            rightBadgeClass = "text-white"; rightBadgeBg = "bg-red-500 rounded px-1 shadow-[0_0_8px_rgba(239,68,68,1)] z-20 -mr-0.5";
        }

        const topRightText = getMonthOrSchoolText(tile);
        if (topRightText) {
            html += `<span class="absolute top-0 right-0 z-10 text-[7px] sm:text-[9px] whitespace-nowrap font-bold scale-90 origin-top-right ${rightBadgeClass} ${rightBadgeBg}">${topRightText}</span>`;
        }
        
        const shortName = getShortName(tile.name);
        
        html += `<div class="flex-grow flex items-center justify-center w-full z-10 px-[1px] mt-2.5 sm:mt-3 pb-1">`;
        html += `<span class="font-bold text-center break-all sm:break-words leading-tight text-[8px] sm:text-[10px] md:text-xs">${shortName}</span>`;
        html += `</div>`;

        // ユニット状態・思想ハイライト
        html += `<div class="w-full flex flex-col items-center justify-end gap-[1px] z-10 min-h-[8px] pb-0.5 px-0.5">`;
        if (unitStatus.complete.length > 0 || unitStatus.reach.length > 0) {
            unitStatus.complete.forEach(u => html += `<span class="bg-red-500 text-white text-[5px] sm:text-[6px] font-bold rounded w-full text-center truncate leading-[1.2] shadow-sm">${u}</span>`);
            unitStatus.reach.forEach(u => html += `<span class="bg-yellow-300 text-yellow-900 text-[5px] sm:text-[6px] font-bold rounded w-full text-center truncate leading-[1.2] shadow-sm">${u}</span>`);
        }
        html += `</div></div>`;
        return html;
    }

    // 待ち候補用の横長タイル
    function createSmallTileHTML(tile, isJunkara = false, onClickHTML = "") {
        const shortName = getShortName(tile.name);
        const gradeText = tile.grade ? `${tile.grade}年` : "";
        const monthText = getMonthOrSchoolText(tile);
        
        const subInfoHTML = (gradeText || monthText) ? `
            <div class="flex flex-col items-center justify-center text-[6px] md:text-[7px] leading-[1.1] shrink-0 ml-auto pl-1 border-l border-gray-300/50">
                ${gradeText ? `<span>${gradeText}</span>` : ""}
                ${monthText ? `<span>${monthText}</span>` : ""}
            </div>
        ` : "";

        const colorClasses = `bg-white border ${seriesColors[tile.series].split(' ')[1]} ${seriesColors[tile.series].split(' ')[2]}`;
        
        let wrapClass = "relative flex items-center h-7 md:h-8 px-1.5 md:px-2 rounded shadow-sm border " + colorClasses;
        if (isJunkara) wrapClass += " opacity-50 grayscale";
        if (onClickHTML) wrapClass += " cursor-pointer hover:scale-105 transition";

        let badge = "";
        if (isJunkara) {
            badge = `<div class="absolute -top-2 left-1/2 transform -translate-x-1/2 bg-gray-600 text-white text-[8px] font-bold px-1 rounded-full border border-white z-10 scale-90 shadow-sm whitespace-nowrap">0枚</div>`;
        }

        return `
            <div class="${wrapClass} w-max shrink-0 mt-2 mr-1" ${onClickHTML}>
                <span class="font-bold text-[10px] md:text-xs truncate leading-none mr-1">${shortName}</span>
                ${subInfoHTML}
                ${badge}
            </div>
        `;
    }

        const btnVisible = document.getElementById('btn-mode-visible');
        const btnThought = document.getElementById('btn-mode-thought');

            btnVisible.classList.add('bg-white', 'text-red-600', 'shadow-sm', 'border-red-400');
            paletteContainer.classList.add('border-red-400');
            handRemoveText.innerText = "タップで捨て牌(純カラ)に";
            handRemoveText.className = "text-[9px] md:text-[10px] text-red-600 font-bold bg-red-100 px-1.5 py-0.5 rounded shadow-sm border border-red-300";
        } else if (mode === 'thought') {
            btnThought.classList.add('bg-white', 'text-purple-600', 'shadow-sm', 'border-purple-400');
            paletteContainer.classList.add('border-purple-400');

            handRemoveText.className = "text-[9px] md:text-[10px] text-purple-600 font-bold bg-purple-100 px-1.5 py-0.5 rounded shadow-sm border border-purple-300";
        }
        
        renderHand(); 
        renderPalette(); 
    };

    window.addTile = function(tileId) {
        if (inputMode === 'thought') {
            if (thoughtTiles.some(t => t.id === tileId)) return;
            if (thoughtTiles.length >= 2) {
                showToast("思想セットは2枚までです");
                return;
            }
            const tile = masterData.tiles.find(t => t.id === tileId);
            thoughtTiles.push(tile);
            renderApp();
            renderPalette();
            return;
        }

        const isHand = selectedHand.some(t => t.id === tileId);
        const isVisible = visibleTiles.some(t => t.id === tileId);

        if (inputMode === 'hand') {
            if (isHand || isVisible) return; 
            if (selectedHand.length >= 9) {
                showToast("手牌は最大9枚までです");
                return;
            }
            const tile = masterData.tiles.find(t => t.id === tileId);
            selectedHand.push(tile);
            selectedHand.sort((a, b) => a.id.localeCompare(b.id));
        } else if (inputMode === 'visible') {
            if (isHand) return; 
            if (isVisible) {
                visibleTiles = visibleTiles.filter(t => t.id !== tileId);
            } else {
                const tile = masterData.tiles.find(t => t.id === tileId);
                visibleTiles.push(tile);
                visibleTiles.sort((a, b) => a.id.localeCompare(b.id));
            }
        }
        
        renderApp();
        renderPalette(); 
    };

    window.removeTileFromHand = function(index) {
        if (inputMode === 'hand') {
            selectedHand.splice(index, 1);
        } else if (inputMode === 'visible') {
            const removedTile = selectedHand.splice(index, 1)[0];
            if (!visibleTiles.some(t => t.id === removedTile.id)) {
                visibleTiles.push(removedTile);
                visibleTiles.sort((a, b) => a.id.localeCompare(b.id));
            }
        } else if (inputMode === 'thought') {
            // 思想モード時は何もしない
            return;
        }
        
        renderApp();
        renderPalette(); 
    };

    window.clearHand = function() {
        if(selectedHand.length > 0 || visibleTiles.length > 0 || thoughtTiles.length > 0) {
            document.getElementById('clear-confirm-modal').classList.remove('hidden');
        }
    };

    window.executeClearHand = function() {
        selectedHand = [];
        visibleTiles = [];
        thoughtTiles = [];
        setInputMode('hand');
        renderApp();
        renderPalette(); 
        document.getElementById('clear-confirm-modal').classList.add('hidden');
    };

    window.closeClearConfirm = function() {
        document.getElementById('clear-confirm-modal').classList.add('hidden');
    };

    // --- 描画ロジック ---
    function renderApp() {
        renderThoughtArea(); // ★追加
        renderHand();
        renderResult();
        
        const handBadge = document.getElementById('hand-count-badge');
        handBadge.innerText = `${selectedHand.length} / 9 枚`;
        if(selectedHand.length >= 9) {
            handBadge.classList.replace('bg-blue-100', 'bg-red-100');
            handBadge.classList.replace('text-blue-800', 'text-red-800');
        } else {
            handBadge.classList.replace('bg-red-100', 'bg-blue-100');
            handBadge.classList.replace('text-red-800', 'text-blue-800');
        }
    }

    function renderHand() {
        const container = document.getElementById('selected-hand');
        if (selectedHand.length === 0) {
            container.innerHTML = `<div class="col-span-9 text-gray-400 text-xs md:text-sm font-bold w-full text-center py-3">パレットから選択してください<br>（鳴き牌も含めて入力）</div>`;
            return;
        }

        const monthCounts = {}; const gradeCounts = {}; const musicalCounts = {}; 
        const handCharIds = selectedHand.map(t => t.characterId).filter(id => id != null);
        let logoSchoolCount = 0;
        const greenCharIds = ["muse_hanayo", "aqours_kanan", "niji_emma", "niji_shioriko", "liella_sumire", "hasu_izumi", "musical_hikaru", "musical_rena", "ikizu_akira", "ikizu_midori"];
        let greenMatchCount = 0;
        
        // 思想セットのマッチ状況確認用
        let thoughtMatchCount = 0;
        if (thoughtTiles.length === 2) {
            thoughtMatchCount = thoughtTiles.filter(tt => selectedHand.some(t => t.id === tt.id)).length;
        }

        selectedHand.forEach(t => {
            if (t.birthMonth) monthCounts[t.birthMonth] = (monthCounts[t.birthMonth] || 0) + 1;
            if (t.grade) gradeCounts[t.grade] = (gradeCounts[t.grade] || 0) + 1;
            if (t.series === 'musical') {
                const school = getMonthOrSchoolText(t);
                if (school) musicalCounts[school] = (musicalCounts[school] || 0) + 1;
            }
            if (t.type === 'logo' || t.type === 'school') logoSchoolCount++;
            if (t.characterId && greenCharIds.includes(t.characterId)) greenMatchCount++;
        });

        const unitStatusMap = {};
        masterData.yakuDef.unitSets.forEach(unit => {
            const matchCount = unit.required.filter(reqId => handCharIds.includes(reqId)).length;
            const neededCount = unit.requiredCount || unit.required.length;
            const isComplete = matchCount >= neededCount;
            const isReach = matchCount === neededCount - 1 && neededCount > 1;

            if (isComplete || isReach) {
                unit.required.forEach(reqId => {
                    if (handCharIds.includes(reqId)) {
                        if (!unitStatusMap[reqId]) unitStatusMap[reqId] = { complete: [], reach: [] };
                        if (isComplete) unitStatusMap[reqId].complete.push(unit.name);
                        else unitStatusMap[reqId].reach.push(unit.name);
                    }
                });
            }
        });

        let html = '';
        selectedHand.forEach((tile, idx) => {
            const mCount = tile.birthMonth ? monthCounts[tile.birthMonth] : 0;
            const gCount = tile.grade ? gradeCounts[tile.grade] : 0;
            const musCount = tile.series === 'musical' ? musicalCounts[getMonthOrSchoolText(tile)] : 0;
            
            const uStatus = { complete: [], reach: [] };
            if (tile.characterId && unitStatusMap[tile.characterId]) {
                uStatus.complete.push(...unitStatusMap[tile.characterId].complete);
                uStatus.reach.push(...unitStatusMap[tile.characterId].reach);
            }
            if (tile.type === 'logo' || tile.type === 'school') {
                if (logoSchoolCount >= 9) uStatus.complete.push("ALL STARS");
                else if (logoSchoolCount === 8) uStatus.reach.push("ALL STARS");
            }
            if (tile.characterId && greenCharIds.includes(tile.characterId)) {
                if (greenMatchCount >= 9) uStatus.complete.push("緑一色");
                else if (greenMatchCount === 8) uStatus.reach.push("緑一色");
            }

            // ★追加: 思想セットバッジの追加
            if (thoughtTiles.length === 2 && thoughtTiles.some(tt => tt.id === tile.id)) {
                if (thoughtMatchCount >= 2) uStatus.complete.push("思想");
                else if (thoughtMatchCount === 1) uStatus.reach.push("思想");
            }

            let onClick = `onclick="window.removeTileFromHand(${idx})"`;
            let extraClasses = "pop-in hover:scale-105 cursor-pointer";
            
            if (inputMode === 'visible') {
                extraClasses += " ring-2 ring-red-300";
            } else if (inputMode === 'thought') {
                extraClasses += " opacity-50 grayscale pointer-events-none"; // 思想モード時は手牌を触れないように
            }

            html += createCompactTileHTML(tile, onClick, extraClasses, mCount, gCount, musCount, uStatus);
        });
        
        for(let i = selectedHand.length; i < 9; i++) {
            html += `<div class="w-full aspect-[2/3] border-2 border-dashed border-gray-300 rounded flex items-center justify-center shrink-0 opacity-50 bg-gray-100"></div>`;
        }
        container.innerHTML = html;
    }

    function renderResult() {
        const header = document.getElementById('result-header');
        const body = document.getElementById('result-body');

        if (selectedHand.length < 8) {
            header.className = "bg-slate-800 text-white font-bold p-1.5 md:p-2 text-center text-xs md:text-sm shrink-0";
            header.innerText = "判定結果";
            body.innerHTML = `<div class="h-full flex items-center justify-center text-gray-400 text-xs md:text-sm text-center">手牌を8枚（待ち確認）<br>または9枚（アガリ確認）選択すると<br>ここに結果が表示されます</div>`;
            return;
        }

        if (selectedHand.length === 8) {
            // 待ち牌判定
            const machiData = checkMachi(selectedHand);
            
            let badgeText = `残り ${machiData.availableCount} 枚`;
            if (machiData.count > 0 && machiData.availableCount === 0) {
                badgeText = `残り 0 枚 (純カラ)`;
            }
            let badgeClass = machiData.availableCount > 0 ? "bg-blue-800" : "bg-red-500";
            
            header.className = "bg-blue-600 text-white font-bold p-1.5 md:p-2 text-center text-xs md:text-sm shrink-0 flex justify-between px-4";
            header.innerHTML = `<span>待ち牌確認（8枚）</span> <span class="${badgeClass} px-2 rounded-full shadow-sm">${badgeText}</span>`;
            
            if (machiData.groups.length === 0) {
                body.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-red-500 font-bold text-center gap-2">
                    <span class="text-4xl">💦</span>
                    アガれる待ち牌はありません。<br>（役がない、または基本セット条件を満たしていません）
                </div>`;
            } else {
                let html = "";
                machiData.groups.forEach(g => {
                    const hasAvailable = g.tiles.some(t => !t.isJunkara);
                    const groupBgClass = hasAvailable ? "bg-white border-blue-400" : "bg-gray-100 border-gray-300 opacity-90";
                    const scoreColor = hasAvailable ? "text-red-600" : "text-gray-500";

                    g.tiles.sort((a, b) => {
                        return (a.isJunkara === b.isJunkara) ? 0 : a.isJunkara ? 1 : -1;
                    });

                    let tilesHtml = `<div class="flex flex-wrap gap-x-1 mt-1">`;
                    g.tiles.forEach(tObj => { tilesHtml += createSmallTileHTML(tObj.tile, tObj.isJunkara); });
                    tilesHtml += `</div>`;

                    html += `
                    <div class="${groupBgClass} p-2 rounded shadow-sm border-l-4 flex flex-col shrink-0">
                        <div class="flex justify-between items-end border-b border-gray-200 pb-1 mb-1">
                            <div class="text-sm md:text-lg font-black ${scoreColor} leading-none">
                                ${g.score.toLocaleString()} ジャラ 
                                ${!hasAvailable ? '<span class="text-[8px] bg-gray-500 text-white px-1 py-0.5 rounded align-middle ml-1">出アガリ不可</span>' : ''}
                            </div>
                            <div class="text-[9px] md:text-xs text-gray-600 font-bold ml-2 text-right">${g.yakuText}</div>
                        </div>
                        ${tilesHtml}
                    </div>
                    `;
                });
                body.innerHTML = html;
            }
        } else if (selectedHand.length === 9) {
            // アガリ判定 ＆ 理牌アシスト
            const res = evaluateHand(selectedHand);
            const currentScore = res.canAgari ? res.totalScore : 0;
            
            let agariHtml = "";
            if (res.canAgari) {
                header.className = "bg-red-600 text-white font-bold p-1.5 md:p-2 text-center text-xs md:text-sm shrink-0 flex justify-between px-4";
                header.innerHTML = `<span>アガリ成立！</span>`;
                
                let yakuList = res.yaku.map(y => `<li class="ml-4 list-disc">${y.name} (${y.score.toLocaleString()})</li>`).join('');
                agariHtml = `
                    <div class="bg-yellow-50 p-2 md:p-3 rounded shadow-sm border-2 border-yellow-400 text-center flex flex-col items-center mb-2 md:mb-4">
                        <div class="text-2xl md:text-3xl font-black text-red-600 mb-1 md:mb-2 drop-shadow-sm">${res.totalScore.toLocaleString()} ジャラ</div>
                        <ul class="text-xs md:text-sm text-gray-700 font-bold text-left bg-white px-4 py-2 rounded border border-yellow-200 inline-block w-full">
                            ${yakuList}
                        </ul>
                    </div>
                `;
            } else {
                header.className = "bg-gray-600 text-white font-bold p-1.5 md:p-2 text-center text-xs md:text-sm shrink-0";
                header.innerHTML = `<span>アガリ不成立</span>`;
                
                let reasonText = "現在の手牌ではアガれません。";
                if (res.reason === "basic") {
                    reasonText = "基本役（3シリーズセット、または<br>1シリーズセット）が完成していません。";
                } else if (res.reason === "bonus") {
                    reasonText = "基本役は完成していますが、<br>加点役（ユニット、学年など）がありません。<br><span class='text-[10px] text-red-500 mt-1 inline-block'>※アガるには加点役が1つ以上必要です</span>";
                }

                agariHtml = `
                    <div class="bg-gray-100 p-2 rounded text-center text-gray-600 font-bold mb-2 border border-gray-300">
                        ${reasonText}
                    </div>
                `;
            }

            // 何を切れば何待ちになるか計算
            let assistHtml = `<div class="font-bold text-gray-700 text-xs md:text-sm mb-1.5 border-b-2 border-gray-300 pb-0.5">どれか1枚を捨てた場合の待ち牌候補</div>`;
            
            let testedTileIds = new Set();
            let candidates = [];

            selectedHand.forEach((discardCandidate, idx) => {
                if(testedTileIds.has(discardCandidate.id)) return;
                testedTileIds.add(discardCandidate.id);

                let testHand8 = [...selectedHand];
                testHand8.splice(idx, 1);
                
                const machiData = checkMachi(testHand8, [discardCandidate.id]);

                if(machiData.count > 0) {
                    let maxScore = 0;
                    let hasAvailableMachi = false;
                    machiData.groups.forEach(g => {
                        if (g.tiles.some(t => !t.isJunkara)) {
                            if (g.score > maxScore) maxScore = g.score;
                            hasAvailableMachi = true;
                        }
                    });
                    if (!hasAvailableMachi) {
                        maxScore = Math.max(...machiData.groups.map(g => g.score));
                    }
                    
                    candidates.push({
                        discardCandidate: discardCandidate,
                        machiData: machiData,
                        maxScore: maxScore,
                        hasAvailableMachi: hasAvailableMachi
                    });
                }
            });

            let globalMaxScore = 0;
            let globalMaxAvailableCount = 0;
            candidates.forEach(c => {
                if (c.hasAvailableMachi) {
                    if (c.maxScore > globalMaxScore) globalMaxScore = c.maxScore;
                    if (c.machiData.availableCount > globalMaxAvailableCount) globalMaxAvailableCount = c.machiData.availableCount;
                }
            });

            // 候補のソート（有効待ちあり優先 -> ベスト候補優先 -> 点数降順 -> 待ち枚数降順）
            candidates.sort((a, b) => {
                if (a.hasAvailableMachi && !b.hasAvailableMachi) return -1;
                if (!a.hasAvailableMachi && b.hasAvailableMachi) return 1;
                
                const aIsBest = (a.maxScore === globalMaxScore && a.maxScore > 0) || (a.machiData.availableCount === globalMaxAvailableCount && globalMaxAvailableCount > 0);
                const bIsBest = (b.maxScore === globalMaxScore && b.maxScore > 0) || (b.machiData.availableCount === globalMaxAvailableCount && globalMaxAvailableCount > 0);
                
                if (aIsBest && !bIsBest) return -1;
                if (!aIsBest && bIsBest) return 1;

                if (b.maxScore !== a.maxScore) return b.maxScore - a.maxScore;
                
                return b.machiData.availableCount - a.machiData.availableCount;
            });

            if (candidates.length === 0) {
                assistHtml += `<div class="text-[10px] md:text-xs text-gray-500 text-center py-2">1枚捨ててアガリ形（待ち）になる牌はありません。</div>`;
            } else {
                candidates.forEach((c, index) => {
                    const discardCandidate = c.discardCandidate;
                    const machiData = c.machiData;
                    const maxScore = c.maxScore;
                    const hasAvailableMachi = c.hasAvailableMachi;
                    
                    let allMachiTiles = [];
                    machiData.groups.forEach(g => {
                        g.tiles.forEach(tObj => {
                            if (!allMachiTiles.some(item => item.tile.id === tObj.tile.id)) {
                                allMachiTiles.push({
                                    tile: tObj.tile,
                                    isJunkara: tObj.isJunkara,
                                    score: g.score
                                });
                            }
                        });
                    });

                    allMachiTiles.sort((a, b) => {
                        if (a.isJunkara !== b.isJunkara) {
                            return a.isJunkara ? 1 : -1;
                        }
                        return b.score - a.score;
                    });
                    
                    let machiTilesHtml = "";
                    let limit = 0;
                    allMachiTiles.forEach(tObj => {
                        if(limit < 5) {
                            machiTilesHtml += createSmallTileHTML(tObj.tile, tObj.isJunkara);
                            limit++;
                        }
                    });
                    if(allMachiTiles.length > 5) machiTilesHtml += `<div class="text-[9px] text-gray-500 ml-1 self-end mb-1 whitespace-nowrap">他 ${allMachiTiles.length - 5}種</div>`;

                    const maxScoreTxt = hasAvailableMachi ? `最大 ${maxScore.toLocaleString()}` : `(純カラ) 最大 ${maxScore.toLocaleString()}`;
                    const maxScoreColor = hasAvailableMachi ? "text-red-600" : "text-gray-500";
                    let remainColor = machiData.availableCount > 0 ? "text-blue-700" : "text-red-500";

                    // 最高打点、最広待ちのバッジ判定とUI出し分け
                    const isHighestScore = hasAvailableMachi && maxScore === globalMaxScore && maxScore > 0;
                    const isMaxWait = hasAvailableMachi && machiData.availableCount === globalMaxAvailableCount && globalMaxAvailableCount > 0;

                    let badges = [];
                    if (currentScore > 0 && maxScore > currentScore) {
                        badges.push(`<span class="bg-red-500 text-white text-[8px] md:text-[9px] px-1.5 py-0.5 rounded shadow-sm animate-pulse font-black whitespace-nowrap">点数UP！</span>`);
                    }
                    
                    if (isHighestScore && isMaxWait) {
                        badges.push(`<span class="bg-orange-500 text-white text-[8px] md:text-[9px] px-1.5 py-0.5 rounded shadow-sm font-black border border-orange-600 whitespace-nowrap">最高打点 & 最広待ち</span>`);
                    } else {
                        if (isHighestScore) {
                            badges.push(`<span class="bg-yellow-400 text-yellow-900 text-[8px] md:text-[9px] px-1.5 py-0.5 rounded shadow-sm font-black border border-yellow-500 whitespace-nowrap">最高打点</span>`);
                        }
                        if (isMaxWait) {
                            badges.push(`<span class="bg-blue-500 text-white text-[8px] md:text-[9px] px-1.5 py-0.5 rounded shadow-sm font-black border border-blue-600 whitespace-nowrap">最広待ち</span>`);
                        }
                    }
                    
                    let upBadgeHtml = badges.length > 0 ? `<div class="flex gap-1 ml-1 md:ml-2 flex-wrap">` + badges.join('') + `</div>` : "";

                    let wrapperClass = "flex items-center p-1.5 md:p-2 rounded shadow-sm border mb-1.5 ";

                    if (!hasAvailableMachi) {
                        wrapperClass += "bg-gray-100 border-gray-300 opacity-80";
                    } else if (currentScore > 0 && maxScore > currentScore) {
                        wrapperClass += "bg-red-50 border-red-300 ring-1 ring-red-300";
                    } else if (isHighestScore || isMaxWait) {
                        wrapperClass += "bg-yellow-50 border-yellow-400 ring-1 ring-yellow-400";
                    } else {
                        wrapperClass += "bg-white border-gray-200";
                    }

                    assistHtml += `
                        <div class="${wrapperClass}">
                            <div class="flex flex-col items-center mr-2 md:mr-3 shrink-0">
                                <span class="text-[8px] text-gray-500 font-bold mb-0.5">これを捨てる</span>
                                ${createCompactTileHTML(discardCandidate, "", "w-[40px] md:w-[50px]")}
                            </div>
                            <div class="flex flex-col flex-grow min-w-0">
                                <div class="flex justify-between items-start md:items-center mb-0.5 border-b border-gray-100 pb-0.5 flex-col md:flex-row gap-1 md:gap-0">
                                    <div class="flex items-center flex-wrap gap-y-1">
                                        <span class="text-[10px] md:text-xs font-bold ${remainColor} whitespace-nowrap">残り ${machiData.availableCount} 枚</span>
                                        ${upBadgeHtml}
                                    </div>
                                    <span class="text-[9px] md:text-[10px] ${maxScoreColor} font-bold whitespace-nowrap">${maxScoreTxt}</span>
                                </div>
                                <div class="flex flex-wrap items-center">
                                    ${machiTilesHtml}
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            body.innerHTML = agariHtml + assistHtml;
        }
    }

    function renderTabs() {
        const tabsContainer = document.getElementById('series-tabs');
        let html = '';
        Object.keys(seriesNames).forEach(key => {
            const isActive = activeTab === key;
            const bgClass = isActive ? 'bg-white text-blue-600 border-b-2 border-blue-600' : 'bg-gray-100 text-gray-500 hover:bg-gray-200';
            html += `<button onclick="window.switchTab('${key}')" class="px-3 md:px-4 py-1.5 md:py-2 font-bold text-[10px] md:text-sm whitespace-nowrap transition-colors ${bgClass}">${seriesNames[key]}</button>`;
        });
        tabsContainer.innerHTML = html;
    }

    function renderPalette() {
        const paletteContainer = document.getElementById('tile-palette');
        const targetTiles = masterData.tiles.filter(t => t.series === activeTab);
        
        let html = '';
        targetTiles.forEach(tile => {
            const inHand = selectedHand.some(t => t.id === tile.id);
            const inVisible = visibleTiles.some(t => t.id === tile.id);
            const inThought = thoughtTiles.some(t => t.id === tile.id);
            
            let extraClasses = "";
            let onClick = "";
            let overlay = "";

            if (inputMode === 'thought') {
                if (inThought) {
                    extraClasses = "ring-4 ring-purple-500 opacity-80 cursor-pointer hover:scale-105";
                    overlay = `<div class="absolute inset-0 bg-purple-500/20 rounded pointer-events-none"></div><div class="absolute inset-0 flex items-center justify-center pointer-events-none"><span class="text-purple-800 font-black text-[10px] bg-white/90 px-1 rounded shadow-sm border border-purple-300">思想</span></div>`;
                    onClick = `onclick="window.removeThoughtTile('${tile.id}')"`;
                } else {
                    extraClasses = "hover:scale-105 cursor-pointer hover:ring-2 hover:ring-purple-300";
                    onClick = `onclick="window.addTile('${tile.id}')"`;
                }
            } else if (inputMode === 'hand') {
                if (inHand) {
                    extraClasses = "opacity-30 grayscale cursor-not-allowed";
                } else if (inVisible) {
                    extraClasses = "ring-2 ring-red-500 opacity-70 bg-red-50 cursor-not-allowed";
                    overlay = `<div class="absolute inset-0 bg-red-500/20 rounded pointer-events-none"></div><div class="absolute inset-0 flex items-center justify-center pointer-events-none"><span class="text-red-600 font-black text-2xl drop-shadow-md pb-2 opacity-80">×</span></div>`;
                } else {
                    extraClasses = "hover:scale-105 cursor-pointer";
                    onClick = `onclick="window.addTile('${tile.id}')"`;
                }
            } else { // inputMode === 'visible'
                if (inHand) {
                    extraClasses = "opacity-30 grayscale cursor-not-allowed";
                } else if (inVisible) {
                    extraClasses = "ring-4 ring-red-500 opacity-80 cursor-pointer hover:scale-105";
                    overlay = `<div class="absolute inset-0 bg-red-500/30 rounded pointer-events-none"></div><div class="absolute inset-0 flex items-center justify-center pointer-events-none"><span class="text-red-700 font-black text-3xl drop-shadow-md pb-2">×</span></div>`;
                    onClick = `onclick="window.addTile('${tile.id}')"`;
                } else {
                    extraClasses = "hover:scale-105 cursor-pointer hover:ring-2 hover:ring-red-300";
                    onClick = `onclick="window.addTile('${tile.id}')"`;
                }
            }
            
            html += createTileHTML(tile, onClick, extraClasses, overlay);
        });
        paletteContainer.innerHTML = html;
    }


    // --- 初期化 ---
    document.addEventListener('DOMContentLoaded', () => {
        renderTabs();
        renderPalette();
        renderApp();
    });

</script>

</body>
</html>
